name: Release Biro2

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: bun-linux-x64
            binary_name: biro2-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            target: bun-linux-arm64
            binary_name: biro2-linux-arm64
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git Bot
        run: |
          git config --global user.name "RzLabs"
          git config --global user.email "280991174+RzLabs@users.noreply.github.com"

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Binary
        run: |
          bun build src/index.tsx --compile --outfile ${{ matrix.binary_name }}

      - name: Generate Checksum
        run: |
          sha256sum ${{ matrix.binary_name }} > ${{ matrix.binary_name }}.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            ${{ matrix.binary_name }}
            ${{ matrix.binary_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Generate Combined Checksums
        run: cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            biro2-linux-x64
            biro2-linux-x64.sha256
            biro2-linux-arm64
            biro2-linux-arm64.sha256
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
