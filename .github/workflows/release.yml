name: Release Biro2

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          # Force install all native platform packages to ensure they are available for cross-compilation
          bun add @opentui/core-linux-x64 @opentui/core-linux-arm64

      - name: Debug dependencies
        run: |
          ls -R node_modules/@opentui/core-linux-x64 2>/dev/null || echo "x64 native package missing"
          ls -R node_modules/@opentui/core-linux-arm64 2>/dev/null || echo "arm64 native package missing"

      - name: Build Binaries
        run: |
          # Build for Linux x64
          bun build src/index.tsx --compile \
            --target=bun-linux-x64 \
            --define "process.platform='linux'" \
            --define "process.arch='x64'" \
            --outfile biro2-linux-x64
          
          # Build for Linux ARM64 (Termux compatible)
          bun build src/index.tsx --compile \
            --target=bun-linux-arm64 \
            --define "process.platform='linux'" \
            --define "process.arch='arm64'" \
            --outfile biro2-linux-arm64

      - name: Generate Checksums
        run: |
          sha256sum biro2-linux-x64 > biro2-linux-x64.sha256
          sha256sum biro2-linux-arm64 > biro2-linux-arm64.sha256
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            biro2-linux-x64
            biro2-linux-arm64
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
